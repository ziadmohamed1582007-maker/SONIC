<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sonic</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f8ff;
    text-align:center;
    padding:20px;
}

.container{
    max-width:500px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h1{
    color:#0066ff;
}

input, textarea{
    width:90%;
    padding:12px;
    margin:8px;
    border:1px solid #ccc;
    border-radius:8px;
}

button{
    background:#0066ff;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}
</style>
</head>

<body>

<div class="container">
    <h1>🚀 Sonic</h1>
    <p>خدمة توصيل سريعة</p>

    <input type="text" id="name" placeholder="الاسم">
    <input type="text" id="phone" placeholder="رقم الهاتف">
    <input type="text" id="address" placeholder="العنوان">
    <textarea id="order" placeholder="اكتب طلبك"></textarea>

    <button onclick="sendOrder()">إرسال الطلب</button>
</div>

<script>
function sendOrder(){

let name = document.getElementById("name").value;
let phone = document.getElementById("phone").value;
let address = document.getElementById("address").value;
let order = document.getElementById("order").value;

let message =
`طلب جديد من Sonic

الاسم: ${name}
الهاتف: ${phone}
العنوان: ${address}

الطلب:
${order}`;

window.open(
`https://wa.me/201055924131?text=${encodeURIComponent(message)}`,
'_blank'
);

}
</script>

</body>
</html>
